<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTC Transit Network Analysis 3D</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.js"></script>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1;
      max-width: 320px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(11, 18, 32, 0.86);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(6px);
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .panel p {
      margin: 0;
      line-height: 1.45;
      font-size: 0.92rem;
      color: #cbd5e1;
    }

    .legend {
      margin-top: 12px;
      display: grid;
      gap: 6px;
      font-size: 0.84rem;
    }

    .controls {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.28);
      display: grid;
      gap: 10px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: #e2e8f0;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: #38bdf8;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .swatch-line {
      width: 18px;
      height: 4px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>TTC Network 3D View</h1>
    <p>
      Explore the TTC graph on a 3D Toronto basemap. Drag to orbit, zoom in to
      see extruded buildings, and click stations for centrality details.
    </p>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="background:#38bdf8"></span>Stations</div>
      <div class="legend-item"><span class="swatch-line" style="background:#94a3b8"></span>Existing edges</div>
      <div class="legend-item"><span class="swatch-line" style="background:#ef4444"></span>Recommended edge</div>
    </div>
    <div class="controls">
      <label class="toggle">
        <input id="buildings-toggle" type="checkbox" checked>
        Show 3D buildings with real map height data
      </label>
    </div>
  </div>

      const layers = map.getStyle().layers || [];
      for (const layer of layers) {
        if (layer.type === 'symbol' && layer.layout && layer.layout['text-field']) {
          return layer.id;
        }
      }
      return undefined;

        }
      }, labelLayerId);

          'circle-stroke-width': 1.2,

          'circle-radius': ['get', 'radius']
        }
      }, labelLayerId);

          'text-field': ['get', 'name'],

            200, '#64748b'
          ],

            15.5,

          ],

          duration: 0
        });
      }

        const feature = event.features && event.features[0];

          return;

        showPopup(
          event.lngLat,
          `<strong>${props.name}</strong><br>` +
          `Degree: ${props.degree}<br>` +
          `Centrality: ${Number(props.centrality).toFixed(3)}`
        );
      });

      map.on('click', 'ttc-recommendation-layer', (event) => {
        const feature = event.features && event.features[0];
